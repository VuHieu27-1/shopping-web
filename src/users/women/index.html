<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="../../style.css">
    <title>Women</title>
</head>
<body id="body_men_page" class="body_men_page collection_theme_men">
    <div class="open_side_bar">
        <i class="material-icons open_icon">arrow_back_ios</i>
    </div>
    <div class="side_bar_menu">
        <a href="../">
            <div class="side_bar_brand">
                <div class="side_bar_brand_mark">Y</div>
                <div class="side_bar_brand_text">
                    <h3>YuYa</h3>
                    <span>Collection Menu</span>
                </div>
            </div>
        </a>
        <div class="side_bar_links">
            <a href="../men/" class="side_bar_item ">
                <i class="material-icons">checkroom</i>
                <span>Men</span>
            </a>
            <a href="./" class="side_bar_item side_bar_item_active_user">
                <i class="material-icons">diamond</i>
                <span>Women</span>
            </a>
            <a href="" class="side_bar_item">
                <i class="material-icons">auto_awesome</i>
                <span>New Collection</span>
            </a>
            <a href="" class="side_bar_item">
                <i class="material-icons">local_offer</i>
                <span>On Sale</span>
            </a>
        </div>
        <div class="side_bar_links side_bar_links_secondary">
            <a href="" class="side_bar_item">
                <i class="material-icons">shopping_cart</i>
                <span>Cart</span>
            </a>
            <button type="button" class="side_bar_item side_bar_item_button">
                <i class="material-icons">search</i>
                <span>Search</span>
            </button>
        </div>
        <div class="side_bar_account">
            <div class="side_bar_item side_bar_item_account">
                <i class="material-icons">account_circle</i>
                <span class="my_account_side"></span>
            </div>
            <div class="side_bar_links side_bar_account_actions">
                <a href="../detail_user/">
                    <div class="side_bar_item">
                        <i class="material-icons">badge</i>
                        <span>My Account</span>
                    </div>
                </a>
                <div class="side_bar_item" onclick="sign_out()">
                    <i class="material-icons">logout</i>
                    <span>Sign Out</span>
                </div>
            </div>
        </div>
    </div>

    <div class="collection_shell">
        <div class="collection_dashboard">
            <div class="menu_title collection_topbar">
                <label class="buttom_search collection_search">
                    <i class="material-icons">search</i>
                    <input type="text" class="collection_search_input" placeholder="Search curated products...">
                </label>
                <div class="side_menu_right collection_actions">
                    <button type="button" class="collection_icon_button" aria-label="Notifications">
                        <i class="material-icons">notifications_none</i>
                    </button>
                    <div class="collection_profile_card">
                        <div>
                            <strong class="collection_profile_name"></strong>
                            <span class="collection_profile_role">CURATION LEAD</span>
                        </div>
                        <img src="../../../asset/img/avata_img.png" alt="Profile">
                    </div>
                </div>
            </div>

            <div class="title_page_men collection_heading">
                <h2></h2>
                <span>Manage your digital atelier's inventory and curation settings.</span>
            </div>

            <div class="collection_catalog_card">
                <div class="js-collection-inventory collection_inventory"></div>
            </div>
        </div>
    </div>

    <script src="../../main.js"></script>
    <script src="../user.js"></script>
    <script src="../page_title_user.js"></script>
</body>
</html>
