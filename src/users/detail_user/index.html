<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../style.css">
    <title>Detail User</title>
</head>
<body class="body_detail_user">
    <div class="setting_detail_user">
        <a href="../" title="Home">
            <div class="admin_brand">
                <div class="admin_brand_logo">Y</div>
                <div class="admin_brand_text">
                    <h1></h1>
                    <p>Management panel</p>
                </div>
            </div>
        </a>
        <a href="./" class="menu_admin_item menu_admin_item_active">
            <i class="material-icons">assignment_add</i>
            <span>Add Info</span>
        </a>
        <a href="./view.html" class="menu_admin_item">
            <i class="material-icons">view_timeline</i>
            <span>View Info</span>
        </a>
    </div>

    <div class="main_content_table">
        <div class="add_info_card">

            <div class="add_info_card_header">
                <div class="add_info_header_icon">
                    <i class="material-icons">person_outline</i>
                </div>
                <div>
                    <h2 class="add_info_form_title">Personal Details</h2>
                    <p class="add_info_form_sub">Fill in all fields to complete your account setup</p>
                </div>
            </div>

            <div class="info_detail_user add_info_body">
                <div class="add_info_field">
                    <label class="add_info_label">Full Name</label>
                    <input type="text" placeholder="Enter your full name" class="input_name add_info_input">
                </div>

                <div class="add_info_field">
                    <label class="add_info_label">Gender</label>
                    <div class="add_info_gender_row">
                        <label class="add_info_gender_opt">
                            <input type="radio" name="radio" value="male" class="male" checked>
                            <span class="add_info_gender_label">
                                <i class="material-icons">male</i>
                                Male
                            </span>
                        </label>
                        <label class="add_info_gender_opt">
                            <input type="radio" name="radio" value="female" class="female">
                            <span class="add_info_gender_label">
                                <i class="material-icons">female</i>
                                Female
                            </span>
                        </label>
                    </div>
                </div>

                <div class="add_info_field">
                    <label class="add_info_label">Email</label>
                    <div class="add_info_input_wrap">
                        <i class="material-icons add_info_input_icon">email</i>
                        <input type="text" placeholder="example@gmail.com" class="input_email add_info_input add_info_input_icon_pad">
                    </div>
                </div>

                <div class="add_info_row2">
                    <div class="add_info_field">
                        <label class="add_info_label">Phone</label>
                        <div class="add_info_input_wrap">
                            <i class="material-icons add_info_input_icon">phone</i>
                            <input type="tel" placeholder="0987654321" class="input_phone add_info_input add_info_input_icon_pad">
                        </div>
                    </div>
                    <div class="add_info_field">
                        <label class="add_info_label">Address</label>
                        <div class="add_info_input_wrap">
                            <i class="material-icons add_info_input_icon">location_on</i>
                            <input type="text" placeholder="Your address" class="input_address add_info_input add_info_input_icon_pad">
                        </div>
                    </div>
                </div>

                <div class="notify_add_success hidden_feature">
                    <i class="material-icons" style="color:#43a047;font-size:20px;">check_circle</i>
                    <span style="color:#43a047;font-family:var(--font_text);font-weight:700;">Details saved successfully!</span>
                </div>
            </div>

            <button class="add_info_submit_btn" onclick="add_details_user()">
                <i class="material-icons">check_circle</i>
                Save Details
            </button>

        </div>
    </div>

    <div class="buttom_back" onclick="back_page()">
        <span><i class="material-icons">arrow_back_ios_new</i></span>
        <button>Back</button>
    </div>

    <script src="../../main.js"></script>
</body>
</html>
