<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../../style.css">
    <title>Product Types</title>
</head>
<body class="body_types_product" onclick="off_open_setting()">
    <div class="types_product_page">

        <div class="types_product_header admin_surface">
            <div class="types_product_title">
                <a href="../" class="types_back_link">
                    <i class="material-icons">arrow_back</i>
                    <span>Back to Products</span>
                </a>
                <div>
                    <h1>Product Types</h1>
                    <div class="admin_breadcrumb">
                        <span>Products</span>
                        <i class="material-icons">chevron_right</i>
                        <span>Types</span>
                    </div>
                </div>
            </div>
            <button class="admin_add_button" onclick="open_modal_types()">
                <i class="material-icons">add</i>
                <span>Add Type</span>
            </button>
        </div>

        <div class="info_table_admin admin_surface">
            <table class="table_admin table_type_product_info">
                <tr>
                    <th>ID</th>
                    <th>Type Name</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </table>
        </div>

    </div>

    <!-- ── Modal: Add / Edit Type ── -->
    <div class="admin_modal_overlay" id="modal_types">
        <div class="admin_modal">
            <div class="admin_modal_header">
                <h3>
                    <i class="material-icons">tune</i>
                    Type Information
                </h3>
                <button class="admin_modal_close" onclick="close_modal_types()">
                    <i class="material-icons">close</i>
                </button>
            </div>
            <div class="admin_modal_body" id="feature_types">
                <div class="admin_modal_field">
                    <label class="admin_modal_label">Type Name</label>
                    <input type="text" id="input_name_type_product" placeholder="e.g. Men, Women, Kids…">
                </div>
                <div class="admin_modal_field">
                    <label class="admin_modal_label">Description</label>
                    <textarea id="decription_product" placeholder="Describe this product type…"></textarea>
                </div>
            </div>
            <div class="admin_modal_footer">
                <button class="admin_modal_cancel" onclick="close_modal_types()">Cancel</button>
                <button class="admin_modal_save" onclick="save_and_close_types()">Save Type</button>
            </div>
        </div>
    </div>

    <script src="../../../main.js"></script>
    <script src="./types.js"></script>
    <script>
        function open_modal_types() {
            document.getElementById('modal_types').classList.add('modal_active');
        }
        function close_modal_types() {
            document.getElementById('modal_types').classList.remove('modal_active');
            document.getElementById('input_name_type_product').value = '';
            document.getElementById('decription_product').value = '';
            check_edit_types = -1;
        }
        function save_and_close_types() {
            add_type_product();
            if (document.getElementById('input_name_type_product').value === '') close_modal_types();
        }
        const _orig_edit_types = window.edit_types;
        window.edit_types = function(id) {
            _orig_edit_types(id);
            open_modal_types();
        };
    </script>
</body>
</html>
