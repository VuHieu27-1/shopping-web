<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="../../style.css">
    <title>Product</title>
</head>
<body>
    <div class="feature_product">
        <input type="file" id="input_img_product">
        <input type="text" id="input_name_product" placeholder="Product Name">
        <input type="number" id="input_quantity" placeholder="Quantity">
        <input type="number" id="input_price" placeholder="Prices">
        <select name="types" id="types_product">
            <option value="" hidden>Choose Type</option>
        </select>
        <button onclick="add_product()">Add Product</button>
    </div>
    <div class="content_table_product">
        <table class="table_product_info">
            <tr>
                <th>ID</th>
                <th>Product Name</th>
                <th>Image Product</th>
                <th>Type Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </table>
    </div>
    <script src="../../main.js"></script>
    <script src="./product.js"></script>
</body>
</html>
