<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="../../style.css">
    <title>View Admin Info</title>
</head>
<body id="body_admin">
    <div id="menu_page_admin">
        <a href="../" title="Home">
        <div class="admin_brand">
            <div class="admin_brand_logo">Y</div>
            <div class="admin_brand_text">
                <h1></h1>
                <p>Management panel</p>
            </div>
        </div>
        </a>
        <a href="../" class="menu_admin_item">
            <i class="material-icons">group</i>
            <span>Users</span>
        </a>
        <a href="../roles/" class="menu_admin_item">
            <i class="material-icons">settings_accessibility</i>
            <span>Roles</span>
        </a>
        <a href="./view.html" class="menu_admin_item menu_admin_item_active">
            <i class="material-icons">badge</i>
            <span>View Admin Info</span>
        </a>
        <a href="../details_user/" class="menu_admin_item">
            <i class="material-icons">manage_accounts</i>
            <span>User Managerment</span>
        </a>
        <a href="../products/" class="menu_admin_item" >
            <i class="material-icons">category</i>
            <span>Product Managerment</span>
        </a>
    </div>
    <div id="content_page_admin">
        <div class="title_page_admin admin_surface">
            <div>
                <h1>Admin Info</h1>
                <div class="admin_breadcrumb">
                    <span>Members</span>
                    <i class="material-icons">chevron_right</i>
                    <span>View Admin Info</span>
                </div>
            </div>
            <button type="button" class="buttom_sign_out" onclick="sign_out()">
                <i class="material-icons">logout</i>
                <span>Sign out</span>
            </button>
        </div>
        <div class="admin_panel admin_surface">
            <div class="info_detail_user">
                <div class="block_feature_admin">
                    <input type="text" placeholder="Name" class="input_name">
                    <div style="display:flex; align-items:center; gap:14px; height:54px; border-radius:16px; border:1px solid #ecd5d8; background:#fffdfc; padding:0 16px; box-sizing:border-box; font-family:var(--font_text); color:#8d4f58;">
                        <span style="margin:0;">Gender</span>
                        <div class="gender" style="display:flex; align-items:center; gap:10px;">
                            <input type="radio" name="radio" value="male" class="male" checked>
                            <span style="margin:0;">Male</span>
                            <input type="radio" name="radio" value="female" class="female">
                            <span style="margin:0;">Female</span>
                        </div>
                    </div>
                    <input type="email" placeholder="@gmail.com" class="input_email">
                    <input type="tel" placeholder="0987654321" class="input_phone">
                </div>
                <div class="block_feature_admin" style="grid-template-columns: 3fr 1fr; margin-top: 14px;">
                    <input type="text" placeholder="Address" class="input_address">
                    <button type="button" class="admin_action_button" onclick="add_details_user()">Save Info</button>
                </div>
                <div class="notify_add_success hidden_feature" style="margin-top: 16px;">
                    <span style="color: rgb(55, 209, 55); font-family: var(--font_text); font-weight: 700;">Admin details have been successfully added.</span>
                </div>
            </div>
        </div>
        <div class="admin_surface admin_panel">
            <div class="title_name" style="display:flex; align-items:center; gap:18px;">
                <img src="../../../asset/img/avata_img.png" alt="" style="width:96px; height:96px; border-radius:28px; object-fit:cover; box-shadow:0 12px 24px rgba(240,107,131,0.18);">
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <h2 style="margin:0; font-family:var(--font_text); color:#8d4f58; font-size:32px;">Admin</h2>
                    <span style="font-family:var(--font_text); color:#ab7f86; font-size:18px;">admin@gmail.com</span>
                </div>
            </div>
        </div>
        <div class="info_table_admin admin_surface">
            <table class="table_details_user">
                <tr>
                    <th width="30%">Field</th>
                    <th>Value</th>
                </tr>
            </table>
        </div>
        <div class="info_detail_user" style="display:none;"></div>
    </div>
    <script src="../../main.js"></script>
    <script src="./view.js"></script>
</body>
</html>
